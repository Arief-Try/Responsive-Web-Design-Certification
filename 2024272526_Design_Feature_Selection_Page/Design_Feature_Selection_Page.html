<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feature Selection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>E-commerce Features</h1>

  <div class="feature-card-container">
    <label class="feature-card">
      <input type="checkbox">
      <div>
        <h3>Free Shipping</h3>
        <p>Get items delivered at no cost</p>
      </div>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <div>
        <h3>Express Delivery</h3>
        <p>Faster delivery time for urgent matters</p>
      </div>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <div>
        <h3>Gift Wrapping</h3>
        <p>Decoration service for users</p>
      </div>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <div>
        <h3>Discount Coupons</h3>
        <p>Get items at a lower cost</p>
      </div>
    </label>
  </div>

</body>
</html>
