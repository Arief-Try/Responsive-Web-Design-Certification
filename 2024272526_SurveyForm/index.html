<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fitness Form</title>
</head>

<body>

  <h1 id="title">Student Fitness Survey</h1>
  <p id="description">Please fill out this survey to help us assess student's fitness level.</p>

  <form id="fitness-form">

    <!-- Name -->
    <label id="name-label" for="name">Name:</label><br>
    <input 
      type="text" 
      id="name" 
      placeholder="Enter your name" 
      required
    ><br><br>

    <!-- Email -->
    <label id="email-label" for="email">Email:</label><br>
    <input 
      type="email" 
      id="email" 
      placeholder="Enter your email" 
      required
    ><br><br>

    <!-- Number -->
    <label id="number-label" for="number">Age:</label><br>
    <input 
      type="number" 
      id="number" 
      placeholder="Enter your age" 
      min="10" 
      max="100"
    ><br><br>

        <!-- Number -->
    <label id="number-label" for="number">How many times do you exercise per week?:</label><br>
    <input 
      type="number" 
      id="number" 
      placeholder="Enter how frequent you exercise" 
      min="10" 
      max="20"
    ><br><br>

    <!-- Dropdown -->
    <label for="dropdown">Select your type of exercise</label><br>
    <select id="dropdown">
      <option value="">Select an option</option>
      <option value="student">Gym</option>
      <option value="developer">Calisthenics</option>
      <option value="developer">Jogging</option>
      <option value="developer">Badminton</option>
      <option value="developer">Rugby</option>
      <option value="developer">Football</option>
      <option value="developer">Basketball</option>
      <option value="developer">Others</option>
    </select><br><br>

    <!-- Radio Buttons -->
    <p>Do you do more than one type of exercise?</p>
    <input type="radio" name="recommend" value="yes"> Yes<br>
    <input type="radio" name="recommend" value="no"> No<br><br>

    <!-- Checkboxes -->
    <p>What other exercise do you enjoy?</p>
    <input type="checkbox" value="Gym"> Gym<br>
    <input type="checkbox" value="Calisthenics">Calisthenics<br>
    <input type="checkbox" value="Jogging">Jogging<br>
    <input type="checkbox" value="Badminton">Badminton<br>
    <input type="checkbox" value="Rugby">Rugby<br>
    <input type="checkbox" value="Football">Football<br>
    <input type="checkbox" value="Basketball">Basketball<br>
    <input type="checkbox" value="Others">Others<br>


    <!-- Textarea -->
    <p>Additional Comments:</p>
    <textarea placeholder="Write your comments here..."></textarea><br><br>

    <!-- Submit Button -->
    <button id="submit" type="submit">Submit</button>

  </form>

</body>
</html>
